# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

schema_version: 1

context:
  name: libtorrent-static
  version: "2.0.12"

package:
  name: "${{ name }}"
  version: "${{ version }}"

source:
  url: "https://github.com/arvidn/libtorrent/releases/download/v${{ version }}/libtorrent-rasterbar-${{ version }}.tar.gz"
  sha256: 25b898d02e02e43ee9a8ea5480c20007f129091b5754d0283f94e4d51d11a19e

build:
  number: 2
  script:
    content:
      - |
        cmake ${CMAKE_ARGS} \
          -G "Ninja" \
          -D BUILD_SHARED_LIBS=OFF \
          .

      - ninja install

requirements:
  build:
    - "${{ compiler('c') }}"
    - "${{ compiler('cxx') }}"
    - if: linux
      then: "${{ stdlib('c') }}"
    - cmake
    - ninja
    - compilers

  host:
    - boost>=1.84.0
    - openssl>=3.0.0
